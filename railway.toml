[build]
builder = 'nixpacks'
buildCommand = 'npm ci && VITE_CLERK_PUBLISHABLE_KEY=$VITE_CLERK_PUBLISHABLE_KEY npm run build && ./node_modules/.bin/esbuild scripts/db-migrate.ts --platform=node --packages=external --bundle --format=esm --outfile=dist/migrate.js'

[deploy]
startCommand = 'node dist/migrate.js && node dist/index.js'
healthcheckPath = '/api/health'
healthcheckTimeout = 120
restartPolicyType = 'on_failure'
