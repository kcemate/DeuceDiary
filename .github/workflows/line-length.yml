name: line-length

on:
  pull_request:

permissions:
  contents: read

jobs:
  line-length:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check line length ≤ 80
        run: |
          pip install black==23.12.1
          black --check --line-length 80 .
